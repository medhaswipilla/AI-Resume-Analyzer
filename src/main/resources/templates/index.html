<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

<meta charset="UTF-8">

<title>AI Resume Analyzer</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

<div class="card shadow p-5">

<h2 class="text-center text-primary">
AI Resume Analyzer
</h2>

<hr>

<form
th:action="@{/analyze}"
method="post"
enctype="multipart/form-data">

<div class="mb-3">

<label>Name</label>

<input
name="name"
class="form-control"
required>

</div>

<div class="mb-3">

<label>Email</label>

<input
type="email"
name="email"
class="form-control"
required>

</div>

<div class="mb-3">

<label>Select Resume</label>

<input
type="file"
name="resume"
class="form-control"
accept=".pdf"
required>

</div>

<button
class="btn btn-success w-100">

Analyze Resume

</button>

</form>

</div>

</div>

</body>
</html>
